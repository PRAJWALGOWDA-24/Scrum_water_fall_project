<!DOCTYPE html>
<html>
<head>
    <title>Choose Model</title>
    

</head>
<body>
<div class="container">
    <h2>Select Development Model</h2>

    <p id="projectInfo"></p>

    <button onclick="goScrum()">Scrum Model</button>
    <button onclick="goWaterfall()">Waterfall Model</button>
</div>
    <script>
        const name = localStorage.getItem("projectName");
        const team = localStorage.getItem("teamSize");

        document.getElementById("projectInfo").innerText =
            "Project: " + name + " | Team Size: " + team;

        function goScrum() {
            window.location.href = "scrum.html";
        }

        function goWaterfall() {
            window.location.href = "waterfall.html";
        }
    </script>

</body>
</html>
