<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="container">

    <h2>Select Development Model</h2>

    <p><strong>Project:</strong> <span id="pname"></span></p>
    <p><strong>Team Size:</strong> <span id="tsize"></span></p>

    <button onclick="goScrum()">Scrum</button>
    <button onclick="goWaterfall()">Waterfall</button>

</div>

<script>
    document.getElementById("pname").innerText = localStorage.getItem("projectName");
    document.getElementById("tsize").innerText = localStorage.getItem("teamSize");

    function goScrum() {
        window.location.href = "scrum.html";
    }
    function goWaterfall() {
        window.location.href = "waterfall.html";
    }
</script>
</body>

</html>
